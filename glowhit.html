<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowHit | 智慧模組化光點反應牆 | Smart Modular Agility Wall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/simulator.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body class="overflow-x-hidden">

    <!-- Translucent Apple Navigation Bar -->
    <nav class="glass-nav fixed w-full top-0 z-50 border-b border-gray-200 px-4 md:px-6 py-4 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-3 cursor-pointer" onclick="navigate('home')">
            <div class="w-8 h-8 rounded-lg bg-black flex items-center justify-center text-white font-bold text-sm tracking-widest octagon">GH</div>
            <span class="text-xl font-semibold tracking-tight">GlowHit</span>
        </div>
        
        <!-- Desktop Navigation Menu - 已移除 About 項目 -->
        <div class="hidden md:flex space-x-8 text-sm font-medium">
            <span class="nav-link text-gray-500 hover:text-black transition cursor-pointer" id="nav-home" onclick="navigate('home')">Home</span>
            <span class="nav-link text-gray-500 hover:text-black transition cursor-pointer" id="nav-product" onclick="navigate('product')">Product</span>
            <span class="nav-link text-gray-500 hover:text-black transition cursor-pointer" id="nav-simulator" onclick="navigate('simulator')">Simulator</span>
            <span class="nav-link text-gray-500 hover:text-black transition cursor-pointer" id="nav-vision" onclick="navigate('vision')">Vision</span>
            <span class="nav-link text-gray-500 hover:text-black transition cursor-pointer" id="nav-science" onclick="navigate('science')">Science</span>
        </div>

        <!-- Language Selector & Action Button -->
        <div class="flex items-center space-x-3 md:space-x-4">
            <div class="flex items-center space-x-1 border border-gray-300 rounded-full px-2.5 py-1 bg-white">
                <i data-lucide="globe" class="w-3.5 h-3.5 text-gray-500"></i>
                <select id="langSelect" onchange="changeLanguage()" class="bg-transparent text-xs font-medium outline-none cursor-pointer text-gray-700">
                    <option value="zh-TW">繁體中文</option>
                    <option value="en">English</option>
                    <option value="zh-CN">简体中文</option>
                    <option value="es">Español</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="pt">Português</option>
                    <option value="ar">العربية</option>
                </select>
            </div>
            
            <button onclick="navigate('simulator')" id="globalCtaBtn" class="hidden sm:inline-flex items-center text-xs font-semibold px-4 py-2 rounded-full apple-btn-primary">
                試玩體驗
            </button>

            <!-- Mobile Hamburger Button -->
            <button onclick="toggleMobileMenu()" class="md:hidden p-1.5 text-gray-600 hover:text-black focus:outline-none" aria-label="Toggle Menu">
                <span id="menuIconContainer"><i data-lucide="menu" class="w-6 h-6"></i></span>
            </button>
        </div>
    </nav>

    <!-- Mobile Fullscreen Overlay Navigation Menu - 已移除 About 項目 -->
    <div id="mobileMenu" class="hidden fixed inset-x-0 top-[73px] bottom-0 z-40 glass-nav border-b border-gray-200 md:hidden flex flex-col px-6 py-8 space-y-6 text-xl font-medium transform -translate-y-8 opacity-0">
        <span class="mob-nav-link text-gray-500 hover:text-black transition cursor-pointer py-2 border-b border-gray-100" id="mob-nav-home" onclick="navigate('home'); toggleMobileMenu();">Home</span>
        <span class="mob-nav-link text-gray-500 hover:text-black transition cursor-pointer py-2 border-b border-gray-100" id="mob-nav-product" onclick="navigate('product'); toggleMobileMenu();">Product</span>
        <span class="mob-nav-link text-gray-500 hover:text-black transition cursor-pointer py-2 border-b border-gray-100" id="mob-nav-simulator" onclick="navigate('simulator'); toggleMobileMenu();">Simulator</span>
        <span class="mob-nav-link text-gray-500 hover:text-black transition cursor-pointer py-2 border-b border-gray-100" id="mob-nav-vision" onclick="navigate('vision'); toggleMobileMenu();">Vision</span>
        <span class="mob-nav-link text-gray-500 hover:text-black transition cursor-pointer py-2 border-b border-gray-100" id="mob-nav-science" onclick="navigate('science'); toggleMobileMenu();">Science</span>
    </div>

    <main id="app" class="pt-24 pb-16 min-h-screen"></main>

    <!-- Global Footer -->
    <footer class="bg-white border-t border-gray-200 py-12 px-6">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center text-xs text-gray-500 space-y-4 md:space-y-0">
            <div>
                <p class="font-semibold text-gray-700" id="footerTitle">GlowHit 智慧模組化光點反應牆專案</p>
                <p class="mt-1" id="footerCopyright">© 2026 RoboRAVE 大阪世界錦標賽創業挑戰賽代表隊. All Rights Reserved.</p>
            </div>
            <div class="flex space-x-6 text-gray-400">
                <span class="hover:underline cursor-pointer" id="footerLink1" onclick="navigate('product')">硬體細節</span>
                <span class="hover:underline cursor-pointer" id="footerLink2" onclick="navigate('science')">神經學文獻</span>
                <!-- 修正點：計畫書連結移轉併入 Vision 頁面 -->
                <span class="hover:underline cursor-pointer" id="footerLink3" onclick="navigate('vision')">大阪參賽計畫書</span>
            </div>
        </div>
    </footer>

    <script>window.translations = {};</script>
    <script src="js/data/zh-tw.js"></script>
    <script src="js/data/en.js"></script>
    <script src="js/data/zh-cn.js"></script>
    <script src="js/data/ja.js"></script>
    <script src="js/data/es.js"></script>
    <script src="js/data/fr.js"></script>
    <script src="js/data/de.js"></script>
    <script src="js/data/pt.js"></script>
    <script src="js/data/ko.js"></script>
    <script src="js/data/ar.js"></script>

    <script src="js/components/navbar.js"></script>
    <script src="js/components/footer.js"></script>
    <script src="js/components/language-switcher.js"></script>
    <script src="js/components/reaction-engine.js"></script>
    <script src="js/components/homekit-mode.js"></script>
    <script src="js/components/power-monitor.js"></script>

    <script src="js/pages/home.js"></script>
    <script src="js/pages/product.js"></script>
    <script src="js/pages/simulator.js"></script>
    <script src="js/pages/vision.js"></script> 
    <script src="js/pages/science.js"></script>

    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
